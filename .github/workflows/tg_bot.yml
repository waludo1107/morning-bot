name: Telegram Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run bot
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: python tg_bot.py
